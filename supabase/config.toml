# For detailed configuration reference documentation, visit:
# https://supabase.com/docs/guides/local-development/cli/config
project_id = "menteiq_app"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[db.migrations]
enabled = true

[auth]
enabled = true
site_url = "https://app.menteiq.ch"
additional_redirect_urls = ["https://app.menteiq.ch/auth/callback"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
minimum_password_length = 8

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
max_frequency = "1s"
otp_length = 6
otp_expiry = 3600

[auth.rate_limit]
# Per hour, per project
email_sent = 100
# Per 5 minutes, per IP
sign_in_sign_ups = 100
token_refresh = 300
token_verifications = 100

[auth.hook.send_email]
enabled = true
uri = "https://app.menteiq.ch/api/auth/send-email"
secrets = "v1,whsec_vlqUvJt88phDzCpMn+kl3GzJq2kEuE4s256Ippj9hfM="

[storage]
enabled = true
file_size_limit = "50MiB"
